# Kedi Smart — single public origin (same pattern as GAIMS on :80)
# Cloudflare Tunnel should point ONLY to:
#   kedismart.com  →  http://127.0.0.1:82
#
# Install on VPS:
#   sudo cp deploy/nginx-kedismart.conf /etc/nginx/sites-available/kedismart
#   sudo ln -sf /etc/nginx/sites-available/kedismart /etc/nginx/sites-enabled/kedismart
#   sudo nginx -t && sudo systemctl reload nginx
#
# Port map on sas-server:
#   8001 = BusinessBooks (do not use)
#   8002 = Kedi Django
#   3000 = Kedi Next.js
#   82   = this nginx door

server {
    listen 127.0.0.1:82;
    listen [::1]:82;
    server_name kedismart.com www.kedismart.com;

    client_max_body_size 25m;

    # Security / SEO transport headers (HTTPS terminated at Cloudflare)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), interest-cohort=()" always;

    # Canonical host: www → apex (Cloudflare may also do this)
    if ($host = www.kedismart.com) {
        return 301 https://kedismart.com$request_uri;
    }

    # Django API + health + uploads + Django static (Unfold admin assets)
    location /api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Tunnel → nginx is HTTP; public clients are always HTTPS via Cloudflare
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8002/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Unfold / Django admin assets via WhiteNoise (gunicorn).
    # Do NOT alias from /home/sas/... — nginx www-data gets 403 on home dirs.
    location /static/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        access_log off;
        expires 7d;
    }

    # Django Unfold — Django itself is mounted at /django-admin/ (do not strip path)
    # Next.js vendor UI stays at /admin/
    location /django-admin/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect http://$host:82/ https://$host/;
        proxy_cookie_path / /;
    }

    # Next.js storefront (must be last)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# Kedi Smart — single public origin (same pattern as GAIMS on :80)
# Cloudflare Tunnel should point ONLY to:
#   kedismart.sascorporationbd.com  →  http://127.0.0.1:82
#
# Install on VPS:
#   sudo cp deploy/nginx-kedismart.conf /etc/nginx/sites-available/kedismart
#   sudo ln -sf /etc/nginx/sites-available/kedismart /etc/nginx/sites-enabled/kedismart
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 127.0.0.1:82;
    listen [::1]:82;
    server_name kedismart.sascorporationbd.com;

    client_max_body_size 25m;

    # Django API + health + uploads + Django static (Unfold admin assets)
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    # Django Unfold admin (Next.js also owns /admin for its UI)
    location /django-admin/ {
        proxy_pass http://127.0.0.1:8001/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect /admin/ /django-admin/;
        proxy_cookie_path / /;
    }

    # Next.js storefront (must be last)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
